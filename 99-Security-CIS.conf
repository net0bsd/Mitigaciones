# ====================================================================
# CAPA 1: PROTECCIÓN DEL KERNEL (Anti-Exploit & Privilege Escalation)
# ====================================================================

# Evita la generación de core dumps de binarios SUID (Corrige el error del atacante)
fs.suid_dumpable = 0

# Oculta direcciones de memoria del kernel (Dificulta exploits de desbordamiento)
kernel.kptr_restrict = 2

# Restringe el uso de ptrace (Evita inyección de código entre procesos)
kernel.yama.ptrace_scope = 1

# Restringe el acceso a dmesg (Evita que el atacante vea errores de segmentación)
kernel.dmesg_restrict = 1

# Habilita ASLR (Randomización del espacio de direcciones)
kernel.randomize_va_space = 2

# Evita ataques de enlaces simbólicos y duros (Vital para servidores web como Oxwall)
fs.protected_hardlinks = 1
fs.protected_symlinks = 1

# ====================================================================
# CAPA 2: STACK DE RED IPv4 (Anti-Reconocimiento y Anti-Spoofing)
# ====================================================================

# Ignora paquetes ICMP redirect (Evita ataques Man-in-the-Middle)
net.ipv4.conf.all.accept_redirects = 0
net.ipv4.conf.default.accept_redirects = 0
net.ipv4.conf.all.secure_redirects = 0
net.ipv4.conf.default.secure_redirects = 0

# No enviar redirecciones (Tu servidor no es un router)
net.ipv4.conf.all.send_redirects = 0
net.ipv4.conf.default.send_redirects = 0

# Anti-Spoofing: Habilita el filtro de ruta inversa (RFC 3704)
# Ayuda a detectar y descartar tráfico con IPs internas falsificadas
net.ipv4.conf.all.rp_filter = 1
net.ipv4.conf.default.rp_filter = 1

# Ignora peticiones de Source Routing (Evita que el atacante "guíe" el paquete)
net.ipv4.conf.all.accept_source_route = 0
net.ipv4.conf.default.accept_source_route = 0

# Log de "Martians" (Registra paquetes con IPs imposibles en /var/log/messages)
net.ipv4.conf.all.log_martians = 1
net.ipv4.conf.default.log_martians = 1

# Protección contra inundación SYN (DoS)
net.ipv4.tcp_syncookies = 1

# Protección contra ataques de reinicio de conexiones (RFC 1337)
net.ipv4.tcp_rfc1337 = 1

# ====================================================================
# CAPA 3: STACK IPv6 (Deshabilitar si no se usa para reducir superficie)
# ====================================================================

net.ipv6.conf.all.disable_ipv6 = 1
net.ipv6.conf.default.disable_ipv6 = 1
net.ipv6.conf.all.accept_ra = 0
net.ipv6.conf.default.accept_ra = 0
